<!DOCTYPE html>

<head>

<title>Page not found | Rezi Tarot</title>
<meta name="robots" content="noindex">
<script>
// Old Wix blog lived at /post/<slug> — send those visitors to the new blog.
(function(){
  var p = location.pathname;
  if (p.indexOf('/post/') === 0 || p.indexOf('/cs/post/') === 0) {
    location.replace('/blog.html');
  }
})();
</script>
<style>
@font-face{font-family:'Black Mango';src:url('/fonts/BlackMango-Regular.ttf') format('truetype');font-weight:400;font-display:swap}

:root{
  --brown-950:#1d0f07;--brown-900:#291709;
  --cream:#f4ead8;--cream-dim:rgba(244,234,216,.62);

}

.links a{

  transition:border-color .2s,color .2s;

</head>
